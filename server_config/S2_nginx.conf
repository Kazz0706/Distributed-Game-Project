worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream approval_backend {
        server approval_service:5000;   # S2_docker-compose.ymlのサービス名とapp.pyのポート
    }


    server {
        listen 80; # コンテナ内部のNginxが80番ポートでリッスン
        server_name 192.168.200.103 _; # または単に "_"

        # 管理者用Webサイト(listen 80)
        location /admin/ {  # これが /admin/login や /admin/dashboard にマッチする
            proxy_pass http://approval_backend/admin/;  # approval_serviceの/admin/に転送
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # approval_serviceへのAPIアクセス
        # ユーザー登録のAPIエンドポイントがここにマッチするはず
        location /approval/ {
            proxy_pass http://approval_backend/; # approval_serviceのルートに転送
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ルートへのアクセスがあった場合は管理画面にリダイレクト (APIエンドポイントと競合しないように後に配置)
        location / {
            return 302 /admin/login;
        }
    }
}