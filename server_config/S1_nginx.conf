# server_config/S1_nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s; # 1秒間に5リクエストに制限

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # 認証・マッチングサービス
    upstream auth_match_backend {
        server auth_match_service:5000;
    }

    # ゲームセッションサービス
    upstream game_session_backend {
        server game_session_service:5000;
    }

    server {
        listen 80; # コンテナ内部のNginxが80番ポートでリッスン
        server_name 192.168.200.102 _; # または単に "_"

        # 認証・マッチングAPI
        location /api/auth/ {
            limit_req zone=api_limit burst=10 nodelay; # リクエスト制限を適用
            proxy_pass http://auth_match_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # マッチングAPI（/api/game/match）がauth_match_serviceで動作している前提
        location = /api/game/match { # ★★★ パスを具体的に /api/game/match に限定する ★★★
            limit_req zone=api_limit burst=5 nodelay; # こちらはさらに厳しく制限
            proxy_pass http://auth_match_backend/match; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ゲームセッションAPI
        location /api/game/ {
            proxy_pass http://game_session_backend/;
            # proxy_pass http://auth_match_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket接続用 (ゲームセッションサービス)
        location /ws/game/ {
            proxy_pass http://game_session_backend/ws/game/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 静的ファイル (クライアントアプリケーション)
        # 上記のAPIエンドポイントと競合しないように、最も最後に配置するのが一般的
        location / {
            root /usr/share/nginx/html; # Dockerfileでクライアントファイルをコピーする場合のパス
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}